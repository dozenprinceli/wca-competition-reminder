# Email templates are intentionally kept outside the Python package so copy and
# wording changes can be reviewed without changing notification logic.

[notification.zh]
subject = "[WCA 比赛提醒] {competition_name}"
text_body = """{greeting}

WCA 新公示了一场包含你所关注项目的比赛。

比赛：{competition_name}
命中的关注项目：{matched_events}
日期：{date_range}
城市：{city}
场馆：{venue}
地址：{venue_address}
比赛坐标：{competition_coordinates}
与你配置位置的直线（大圆）距离：{distance}
WCA 公示时间：{announced_at}
比赛详情：{competition_url}{venue_details_line}

修改订阅：{modify_subscription_url}
取消订阅：{cancel_subscription_url}
"""
html_body = """<!doctype html>
<html lang="zh-CN">
<body>
  <p>{greeting}</p>
  <p>WCA 新公示了一场包含你所关注项目的比赛。</p>
  <table cellpadding="6" cellspacing="0" border="0">
    <tr><th align="left">比赛</th><td>{competition_name}</td></tr>
    <tr><th align="left">命中的关注项目</th><td><strong>{matched_events}</strong></td></tr>
    <tr><th align="left">日期</th><td>{date_range}</td></tr>
    <tr><th align="left">城市</th><td>{city}</td></tr>
    <tr><th align="left">场馆</th><td>{venue}</td></tr>
    <tr><th align="left">地址</th><td>{venue_address}</td></tr>
    <tr><th align="left">比赛坐标</th><td>{competition_coordinates}</td></tr>
    <tr><th align="left">与你配置位置的直线（大圆）距离</th><td><strong>{distance}</strong></td></tr>
    <tr><th align="left">WCA 公示时间</th><td>{announced_at}</td></tr>
  </table>
  <p><a href="{competition_url}">查看 WCA 比赛详情</a></p>
  {venue_details_html}
  <p style="margin-top:24px;padding-top:16px;border-top:1px solid #d9d9d9;font-size:13px">
    <a href="{modify_subscription_url}">修改订阅</a>
    <span aria-hidden="true"> · </span>
    <a href="{cancel_subscription_url}">取消订阅</a>
  </p>
</body>
</html>"""

